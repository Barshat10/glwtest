<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GLW Help Bot</title>

  <style>
    :root{
      --glw:#bc1c53;
      --glw2:#d62b67;

      --ink:#0b1220;
      --muted:#64748b;
      --line:rgba(15,23,42,.12);

      --bg:#d1d6d3;
      --card:#ffffff;

      --shadow: 0 18px 50px rgba(2,6,23,.18);
      --shadow-soft: 0 10px 30px rgba(2,6,23,.10);

      --r16:16px;
      --r20:20px;

      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans";

      --user:#eef2ff;
      --userLine:rgba(99,102,241,.18);

      --botBg:rgba(188,28,83,.06);
      --botLine:rgba(188,28,83,.16);
    }

    *{ box-sizing:border-box; }
    body{
      font-family: var(--font);
      margin:0;
      height:100vh;
      background: transparent; /* ✅ IMPORTANT: iframe doesn't block website */
      color: var(--ink);
    }

    /* ❌ Floating button removed (no .fab in this version) */

    /* ✅ Window: make it fill the iframe (not fixed on page) */
    .win{
      position: relative;        /* changed */
      right: auto;
      bottom: auto;

      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;

      background: var(--card);
      border-radius: var(--r20);
      box-shadow: var(--shadow);
      overflow:hidden;
      border: 1px solid var(--line);

      opacity: 1;               /* changed */
      transform: none;          /* changed */
      pointer-events: auto;     /* changed */
    }

    /* Header */
    .header{
      height:64px;
      background:
        radial-gradient(1200px 240px at -10% -50%, rgba(188,28,83,.18), transparent 60%),
        linear-gradient(180deg, #ffffff, #fbfbfd);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 10px 12px 10px 14px;
      border-bottom: 1px solid var(--line);
    }
    .title{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .badge{
      width:36px;height:36px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--glw), var(--glw2));
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:12px;
      letter-spacing:.4px;
      flex:0 0 auto;
      user-select:none;
      box-shadow: 0 10px 24px rgba(188,28,83,.22);
    }
    .titleText{
      display:flex;
      flex-direction:column;
      min-width:0;
      line-height:1.05;
    }
    .titleText .name{
      font-weight: 900;
      font-size: 14px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .titleText .sub{
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      margin-top: 4px;
    }

    .actions{
      display:flex;
      align-items:center;
      gap: 4px;
    }
    .iconbtn{
      border:none;
      background: transparent;
      cursor:pointer;
      color: #334155;
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 16px;
      line-height: 1;
    }
    .iconbtn:hover{ background: rgba(15,23,42,.06); }

    /* Body */
    .body{
      height: calc(100% - 64px - 76px);
      overflow:auto;
      padding: 12px 12px 10px;
      background:
        radial-gradient(900px 280px at 10% 0%, rgba(188,28,83,.06), transparent 55%),
        #ffffff;
    }

    .msg{
      max-width: 84%;
      padding: 10px 12px;
      border-radius: 14px;
      margin: 10px 0;
      line-height:1.45;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user{
      margin-left:auto;
      background: var(--user);
      border: 1px solid var(--userLine);
      border-bottom-right-radius: 8px;
    }
    .msg.assistant{
      margin-right:auto;
      background: var(--botBg);
      border: 1px solid var(--botLine);
      border-bottom-left-radius: 8px;
    }

    /* Quick chips (only in first message) */
    .quickRow{
      display:flex;
      gap:8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .qchip{
      border: 1px solid rgba(15,23,42,.14);
      background: #fff;
      color:#334155;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      cursor:pointer;
      user-select:none;
      transition: transform .08s ease, border-color .12s ease, background .12s ease;
    }
    .qchip:hover{
      transform: translateY(-1px);
      border-color: rgba(188,28,83,.22);
      background: rgba(188,28,83,.04);
    }

    .typing{
      display:inline-block;
      font-size:12px;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,.10);
      background: #fff;
      margin: 8px 0;
    }

    /* Sources: compact collapsible */
    .sourcesToggle{
      margin: -2px 0 10px 6px;
      font-size: 12px;
      color: var(--muted);
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      user-select:none;
    }
    .sourcesToggle .pill{
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(188,28,83,.18);
      background: rgba(188,28,83,.06);
      color: var(--glw);
      font-weight: 700;
      font-size: 11px;
    }
    .sourcesBox{
      margin: 6px 0 12px 6px;
      display:none;
      gap:8px;
      flex-wrap: wrap;
    }
    .sourcesBox.open{ display:flex; }
    .sourceLink{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,.12);
      background: #fff;
      text-decoration:none;
      color:#334155;
      box-shadow: 0 8px 18px rgba(2,6,23,.05);
    }
    .sourceLink:hover{
      border-color: rgba(188,28,83,.24);
    }
    .sourceLink .n{
      width: 20px; height: 20px;
      border-radius: 999px;
      background: rgba(188,28,83,.10);
      color: var(--glw);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 800;
      font-size: 11px;
    }

    /* Footer */
    .footer{
      height:76px;
      display:flex;
      gap:10px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background:#fff;
    }
    .input{
      flex:1;
      border-radius: 14px;
      border:1px solid rgba(15,23,42,.14);
      padding: 12px 12px;
      outline:none;
      font-size: 14px;
    }
    .input:focus{
      border-color: rgba(188,28,83,.42);
      box-shadow: 0 0 0 4px rgba(188,28,83,.12);
    }
    .send{
      width:48px;height:48px;
      border-radius: 14px;
      border:none;
      cursor:pointer;
      background: linear-gradient(135deg, var(--glw), var(--glw2));
      color:white;
      font-size:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 12px 26px rgba(188,28,83,.22);
      transition: transform .08s ease, filter .12s ease;
    }
    .send:hover{ filter: brightness(1.03); }
    .send:active{ transform: scale(.98); }

    @media (prefers-reduced-motion: reduce) {
      .send { transition: none; }
      .qchip, .sourceLink { transition: none; }
    }
  </style>
</head>

<body>
  <!-- ❌ Removed fab button here -->

  <!-- ✅ Window is always visible inside iframe -->
  <div class="win" id="window" role="dialog" aria-label="GLW Help Bot">
    <div class="header">
      <div class="title">
        <div class="badge">GLW</div>
        <div class="titleText">
          <div class="name">Help Bot</div>
          <div class="sub">FAQ • Products • Troubleshooting</div>
        </div>
      </div>
      <div class="actions">
        <!-- keep buttons visually, but they just close the iframe window content -->
        <button class="iconbtn" id="minBtn" title="Minimize">—</button>
        <button class="iconbtn" id="closeBtn" title="Close">✕</button>
      </div>
    </div>

    <div class="body" id="messages"></div>

    <div class="footer">
      <input class="input" id="input" placeholder="Type your question…" />
      <button class="send" id="send" title="Send">➤</button>
    </div>
  </div>

  <script>
    //const API_URL = "https://adjustments-antiques-exceed-obligation.trycloudflare.com/chat";
    const API_URL = " https://proposals-collector-spare-henderson.trycloudflare.com/chat";

    const win = document.getElementById("window");
    const closeBtn = document.getElementById("closeBtn");
    const minBtn = document.getElementById("minBtn");

    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const messages = document.getElementById("messages");

    // Stable session id
    let sessionId = localStorage.getItem("glw_helpbot_session_id");
    if (!sessionId) {
      sessionId = (window.crypto && crypto.randomUUID)
        ? crypto.randomUUID()
        : "sid-" + Math.random().toString(16).slice(2) + "-" + Date.now();
      localStorage.setItem("glw_helpbot_session_id", sessionId);
    }

    let typingEl = null;

    function addMessage(text, who) {
      const div = document.createElement("div");
      div.className = "msg " + who;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function showTyping() {
      if (typingEl) return;
      typingEl = document.createElement("div");
      typingEl.className = "typing";
      typingEl.textContent = "Thinking…";
      messages.appendChild(typingEl);
      messages.scrollTop = messages.scrollHeight;
    }

    function hideTyping() {
      if (!typingEl) return;
      typingEl.remove();
      typingEl = null;
    }

    function renderQuickChips(container){
      const row = document.createElement("div");
      row.className = "quickRow";

      const items = [
        { label: "Troubleshoot", q: "I have a machine problem. Help me troubleshoot step-by-step." },
        { label: "Products",     q: "I need help finding a product. What options do you have?" },
        { label: "FAQ",          q: "Where can I find answers in the FAQ?" },
        { label: "Contact",      q: "How can I contact support / service?" }
      ];

      items.forEach(it=>{
        const b = document.createElement("div");
        b.className = "qchip";
        b.textContent = it.label;
        b.addEventListener("click", ()=>{
          sendMessage(it.q);
        });
        row.appendChild(b);
      });

      container.appendChild(row);
    }

    function renderSources(sources){
      const top = (sources || []).slice(0, 3);
      if (!top.length) return;

      const toggle = document.createElement("div");
      toggle.className = "sourcesToggle";
      toggle.innerHTML = `<span class="pill">Sources</span><span>show</span>`;

      const box = document.createElement("div");
      box.className = "sourcesBox";

      top.forEach((s, idx) => {
        const a = document.createElement("a");
        a.className = "sourceLink";
        a.href = s.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.innerHTML = `<span class="n">${idx+1}</span><span>Open</span>`;
        box.appendChild(a);
      });

      toggle.addEventListener("click", ()=>{
        const open = box.classList.toggle("open");
        toggle.lastElementChild.textContent = open ? "hide" : "show";
        messages.scrollTop = messages.scrollHeight;
      });

      messages.appendChild(toggle);
      messages.appendChild(box);
      messages.scrollTop = messages.scrollHeight;
    }

    function ensureGreeting() {
      if (messages.dataset.greeted) return;

      const bubble = addMessage("Hi! 😊 How can I help you today?", "assistant");
      renderQuickChips(bubble);

      messages.dataset.greeted = "1";
    }

    async function sendMessage(text) {
      const msg = (text ?? input.value).trim();
      if (!msg) return;

      if (text == null) input.value = "";
      addMessage(msg, "user");
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ message: msg, session_id: sessionId })
        });

        hideTyping();

        if (!res.ok) {
          addMessage(`⚠️ Server error (${res.status}). Please try again.`, "assistant");
          return;
        }

        const data = await res.json();
        addMessage(data.answer ?? "Hmm, I didn’t get that. Can you try again?", "assistant");

        if (data.sources && data.sources.length) {
          renderSources(data.sources);
        }
      } catch (e) {
        hideTyping();
        addMessage("⚠️ I can’t reach the server right now. Is FastAPI running on port 8000?", "assistant");
      }
    }

    // Events
    send.addEventListener("click", () => sendMessage());
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // These buttons only hide the chat UI INSIDE the iframe (optional)
    function hideWindowInsideIframe(){
      win.style.display = "none";
    }
    closeBtn.addEventListener("click", hideWindowInsideIframe);
    minBtn.addEventListener("click", hideWindowInsideIframe);

    // Init
    ensureGreeting();
    setTimeout(() => input.focus(), 150);
  </script>
</body>
</html>
