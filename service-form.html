<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GLW Service Request</title>
  <meta name="description" content="Service request form for GLW machines.">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="service-form.css">
</head>
<body>
  <header class="service-header">
    <div class="service-header__inner">
      <a class="service-back-link" href="index.html">← Back to Homepage</a>
      <div class="service-brand">GLW Service</div>
    </div>
  </header>

  <main class="service-page">
    <section class="service-shell">
      <div class="service-intro">
        <h1>Machine Service Request</h1>
        <p>
          Please fill in the machine details below. After submission, the request
          will be forwarded to our service email address.
        </p>
      </div>

      <form
        id="serviceForm"
        class="service-form"
        action="https://formsubmit.co/barshat10kc@gmail.com"
        method="POST"
      >
        <input type="hidden" name="_subject" value="New GLW Service Request">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" value="https://barshat10.github.io/glwtest/service-form.html?success=1">
        <input type="hidden" id="warrantyStatus" name="warranty_status" value="">

        <section class="form-section">
          <h2>Select Machine</h2>
          <div class="machine-slider" role="radiogroup" aria-label="Machine selection">
            <label class="machine-option">
              <input type="radio" name="machine" value="PEC40" required>
              <span class="machine-card">PEC40</span>
            </label>

            <label class="machine-option">
              <input type="radio" name="machine" value="MC25">
              <span class="machine-card">MC25</span>
            </label>

            <label class="machine-option">
              <input type="radio" name="machine" value="PC65">
              <span class="machine-card">PC65</span>
            </label>

            <label class="machine-option">
              <input type="radio" name="machine" value="CS60">
              <span class="machine-card">CS60</span>
            </label>
          </div>
        </section>

        <section class="form-section">
          <h2>Machine Information</h2>

          <div class="form-grid">
            <label class="field">
              <span>Serial Number *</span>
              <input type="text" id="serial" name="serial" placeholder="Enter serial number" required>
            </label>

            <label class="field">
              <span>Year of Manufacture *</span>
              <input type="number" id="year" name="year" min="1900" max="2099" placeholder="e.g. 2019" required>
            </label>
          </div>

          <p id="warrantyMessage" class="warranty-message" aria-live="polite"></p>

          <div id="warrantyQuestions" class="warranty-questions">
            <div class="form-grid">
              <label class="field">
                <span>Machine Type</span>
                <select id="machineType" name="machineType">
                  <option value="">Select type</option>
                  <option value="Crimping">Crimping</option>
                  <option value="Stripping">Stripping</option>
                  <option value="Crimping and Stripping">Crimping and Stripping</option>
                  <option value="Cutting">Cutting</option>
                  <option value="Ferrules">Ferrules</option>
                </select>
              </label>

              <label class="field">
                <span>Last Repair</span>
                <input type="text" id="lastRepair" name="lastRepair" placeholder="e.g. 2024-11 or 15.01.2025">
              </label>
            </div>

            <div id="meterReadingSection">
              <label class="field">
                <span>Meter Reading</span>
                <input type="number" id="meter" name="meter" min="0" placeholder="Optional">
              </label>
            </div>
          </div>

          <label class="field">
            <span>Upload Images (optional, not active yet)</span>
            <input type="file" id="images" name="images" multiple disabled>
            <small class="field-hint">This field is shown for later use, but it is currently inactive.</small>
          </label>
        </section>

        <section class="form-section">
          <h2>Contact Information</h2>

          <div class="form-grid">
            <label class="field">
              <span>Email</span>
              <input type="email" id="email" name="email" placeholder="yourname@example.com">
            </label>

            <label class="field">
              <span>Phone</span>
              <input type="text" id="phone" name="phone" placeholder="+49 ...">
            </label>
          </div>

          <label class="field">
            <span>Additional Notes</span>
            <textarea id="notes" name="notes" rows="5" placeholder="Describe the issue or add more details"></textarea>
          </label>
        </section>

        <div class="form-actions">
          <button type="submit" class="submit-btn">Submit Request</button>
          <p id="formStatus" class="form-status" aria-live="polite"></p>
        </div>
      </form>
    </section>
  </main>

  <script src="service-form.js"></script>
</body>
</html>
